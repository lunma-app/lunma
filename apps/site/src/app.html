<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <!-- Matches the dark substrate (--bg: oklch(0.155 0 0)) so the browser chrome
         tints to the page instead of flashing a light bar. -->
    <meta name="theme-color" content="#181818" />
    <!-- The brand mark, shared with the extension (canonical source: favicon.svg).
         Sized PNGs (icon-N.png are the extension's exact files) drive the favicon
         so the tab follows the same small-size rule the extension does — the
         crescent + ember at 16px (halos dropped), the full crescent mark at 32px+
         — instead of the SVG smudging at tab size. The SVG stays as the crisp
         Safari mask icon. -->
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/icons/icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="%sveltekit.assets%/icons/icon-48.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="%sveltekit.assets%/icons/icon-128.png" />
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#181818" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
