<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar carousel harness — jump experiment</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #08090c;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
      }
      body {
        display: flex;
        align-items: stretch;
      }
      /* Sidebar-width column, like the real side panel. */
      #app {
        width: 340px;
        height: 100vh;
        overflow: hidden;
        border-right: 1px solid #222;
        flex: 0 0 340px;
      }
      #controls {
        flex: 1;
        min-width: 0;
        height: 100vh;
        overflow: auto;
        color: #d6d9e0;
        padding: 20px 24px;
        box-sizing: border-box;
      }
      #controls h1 {
        font-size: 15px;
        letter-spacing: 0.02em;
        margin: 0 0 4px;
      }
      #controls .sub {
        color: #8b91a0;
        font-size: 12px;
        margin: 0 0 18px;
        max-width: 64ch;
        line-height: 1.5;
      }
      .counters {
        display: flex;
        gap: 12px;
        margin-bottom: 18px;
      }
      .counter {
        background: #11141a;
        border: 1px solid #232838;
        border-radius: 10px;
        padding: 10px 16px;
        min-width: 90px;
      }
      .counter .label {
        font-size: 10px;
        letter-spacing: 0.08em;
        color: #7b8294;
        text-transform: uppercase;
      }
      .counter .value {
        font-size: 26px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .counter.flag .value {
        color: #ff6b6b;
      }
      .knobs {
        display: flex;
        flex-wrap: wrap;
        gap: 14px 22px;
        align-items: center;
        margin-bottom: 18px;
        font-size: 13px;
      }
      .knobs label {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: #b9bfcc;
      }
      .knobs input[type='number'] {
        width: 64px;
        background: #11141a;
        border: 1px solid #2a3142;
        border-radius: 6px;
        color: #e6e9ef;
        padding: 5px 8px;
        font: inherit;
      }
      .knobs .strong {
        color: #e6e9ef;
        font-weight: 600;
      }
      .btns {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .btns button {
        background: #1b2230;
        border: 1px solid #2f3850;
        color: #dfe3ea;
        border-radius: 8px;
        padding: 8px 14px;
        font: inherit;
        cursor: pointer;
      }
      .btns button:hover {
        background: #232c3e;
      }
      .btns button.primary {
        background: #2b5cff;
        border-color: #2b5cff;
        color: #fff;
      }
      #log {
        background: #0b0e13;
        border: 1px solid #1d2230;
        border-radius: 8px;
        padding: 10px 12px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 11.5px;
        line-height: 1.6;
        color: #aeb6c6;
        max-height: 38vh;
        overflow: auto;
        white-space: pre-wrap;
      }
      #log .jump {
        color: #ff7b7b;
      }
      #log .ok {
        color: #62d394;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="controls"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
