version: 2
updates:
  # The pnpm workspace (root lockfile covers apps/* + packages/*).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Keep the noise down: batch routine minor/patch bumps into one PR each
      # for dev- and production-scoped deps. Majors still come through solo so
      # they get individual review.
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      production-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]
    ignore:
      # @types/node tracks the Node runtime major; we pin to the Node 24 line
      # (engines: ">=24", devbox nodejs@24). Hold major bumps until we move
      # runtimes, so the type defs can't outrun the installed Node.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # The actions pinned in .github/workflows/ci.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
