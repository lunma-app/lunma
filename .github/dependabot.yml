version: 2
updates:
  # The pnpm workspace (root lockfile covers apps/* + packages/*).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Wait out fresh releases before proposing them. This exceeds pnpm's
    # ~1-day `minimumReleaseAge` (pnpm-workspace.yaml), so Dependabot never opens
    # a bump that `pnpm install --frozen-lockfile` would then reject in CI — and
    # it gives every release a bake-in window (supply-chain hygiene).
    cooldown:
      default-days: 7
    groups:
      # One PR for ALL routine minor/patch bumps (dev + prod together): a single
      # lockfile write per cycle, so grouped PRs can't conflict with each other
      # on pnpm-lock.yaml the way separate dev/prod groups did. Majors still come
      # through solo so they get individual review.
      dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # @types/node tracks the Node runtime major; we pin to the Node 24 line
      # (engines: ">=24", devbox nodejs@24). Hold major bumps until we move
      # runtimes, so the type defs can't outrun the installed Node.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # The actions pinned in .github/workflows/ci.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
