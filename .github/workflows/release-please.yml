name: Release

# release-please derives the next semver from the Conventional-Commit history on
# `main`, maintaining a rolling Release PR that bumps apps/extension/package.json
# and public/manifest.json in lockstep (its `extra-files` updater) and regenerates
# CHANGELOG.md; merging that PR creates the `vX.Y.Z` tag + GitHub release. When a
# release is cut, the job then builds the extension and attaches a downloadable
# `lunma-<version>.zip` to that release. It runs ONLY on push to `main` — it is
# NOT a pull-request status check, so the branch-protection required-check set
# (`verify` + `e2e` + `dco` + `identity`) is unchanged. The Chrome Web Store
# upload is a deferred later phase. See `docs/releasing.md` and the openspec
# changes `semver-enforcement` + `extension-release-pipeline`.
on:
  push:
    branches: [main]

# Least privilege: open/update the Release PR, create the tag + GitHub release,
# and upload the release asset (all `contents: write`).
permissions:
  contents: write
  pull-requests: write

# Never cancel an in-flight release run — interrupting it mid-tag is unsafe.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      # Let corepack fetch the packageManager-pinned pnpm non-interactively.
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
      # 'true' once the Chrome Web Store item id secret is configured. Gates the
      # store-publish step so releases still succeed before the store is armed.
      # (secrets can't be read directly in `if:`, so surface it as an env flag.)
      HAS_CWS: ${{ secrets.CWS_EXTENSION_ID != '' }}
      # 'true' once the CWS_PRIVATE_KEY secret is set (Verified CRX uploads).
      # Upload is signed when true; unsigned otherwise (store rejects unsigned
      # uploads once Verified CRX is opted in, so set this before opting in).
      HAS_CWS_KEY: ${{ secrets.CWS_PRIVATE_KEY != '' }}
    steps:
      # Pinned to a major (consistent with the other workflows' action pinning);
      # CI-only, least-privilege token, so the action has no runtime blast radius.
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Everything below runs ONLY when a release was just cut, so ordinary
      # pushes (which merely update the Release PR) do no build work.
      - if: ${{ steps.release.outputs['apps/extension--release_created'] == 'true' }}
        uses: actions/checkout@v6.0.3
      - if: ${{ steps.release.outputs['apps/extension--release_created'] == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - if: ${{ steps.release.outputs['apps/extension--release_created'] == 'true' }}
        run: corepack enable
      - if: ${{ steps.release.outputs['apps/extension--release_created'] == 'true' }}
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - if: ${{ steps.release.outputs['apps/extension--release_created'] == 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - if: ${{ steps.release.outputs['apps/extension--release_created'] == 'true' }}
        run: pnpm install --frozen-lockfile
      # Build the production extension and attach it as a versioned, downloadable
      # asset. Reuses the package's `pack` script (pnpm build → dist → zip);
      # `--clobber` makes a re-run idempotent.
      - if: ${{ steps.release.outputs['apps/extension--release_created'] == 'true' }}
        name: Build and attach lunma-${{ steps.release.outputs['apps/extension--version'] }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @lunma/extension run pack
          asset="lunma-${{ steps.release.outputs['apps/extension--version'] }}.zip"
          mv apps/extension/extension.zip "$asset"
          gh release upload "${{ steps.release.outputs['apps/extension--tag_name'] }}" "$asset" --clobber
      # Pack the ZIP as a signed CRX3 (Verified CRX uploads is opted in — the
      # store requires a CRX signed with the registered private key) then upload
      # via the Verified CRX protocol. Both CWS_EXTENSION_ID and CWS_PRIVATE_KEY
      # must be set; the step is skipped otherwise.
      # See the openspec change `extension-store-publish` + docs/releasing.md.
      - if: ${{ steps.release.outputs['apps/extension--release_created'] == 'true' && env.HAS_CWS == 'true' && env.HAS_CWS_KEY == 'true' }}
        name: Publish lunma-${{ steps.release.outputs['apps/extension--version'] }}.crx to the Chrome Web Store
        env:
          ZIP: lunma-${{ steps.release.outputs['apps/extension--version'] }}.zip
          VERSION: ${{ steps.release.outputs['apps/extension--version'] }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_PRIVATE_KEY: ${{ secrets.CWS_PRIVATE_KEY }}
        run: |
          TOKEN_RESP=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&refresh_token=${REFRESH_TOKEN}&grant_type=refresh_token")
          TOKEN=$(printf '%s' "$TOKEN_RESP" | jq -r .access_token)
          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "::error::OAuth token request failed: $(printf '%s' "$TOKEN_RESP" | jq -c .)"
            exit 1
          fi

          # Unpack the release ZIP and re-pack as a signed CRX3.
          unzip -q "$ZIP" -d /tmp/lunma-ext
          printf '%s' "$CWS_PRIVATE_KEY" | tr -d '\r' > /tmp/cws-private.pem
          google-chrome --pack-extension=/tmp/lunma-ext \
            --pack-extension-key=/tmp/cws-private.pem \
            --no-sandbox
          rm -f /tmp/cws-private.pem
          CRX=/tmp/lunma-ext.crx

          curl --no-progress-meter -X PUT \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "X-Goog-Upload-Protocol: raw" \
            -H "X-Goog-Upload-File-Name: lunma-${VERSION}.crx" \
            -T "$CRX" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${EXTENSION_ID}" \
            | tee /dev/stderr | jq -e '.uploadState == "SUCCESS"'
          rm -rf "$CRX" /tmp/lunma-ext

          curl --no-progress-meter -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${EXTENSION_ID}/publish" \
            | tee /dev/stderr | jq -e '[.status[]] | map(test("^OK")) | all'
