name: CI

# Runs the same checks developers run locally (`pnpm -r verify`) plus the
# Playwright MV3 smoke, on every pull request and every push to main. The
# extension's verify is fanned across parallel jobs — typecheck / lint /
# svelte-check / styles / unit tests, each on its own runner — instead of one
# serial run, so the slow steps (tsc, svelte-check) overlap. The `verify` job is
# a no-op aggregator that goes green only when every extension leg AND `site`
# pass, so `verify` stays the single required status check. The required
# contexts — `verify` and `e2e` — are unchanged; keep them in lockstep with the
# main branch ruleset (see github-repo-and-ci tasks.md §2 + open-source-public-launch §4.1).
on:
  pull_request:
  push:
    branches: [main]
  # The merge queue re-runs the full gate against the queued commits + latest
  # main on a temporary branch, so required checks must report on this event or
  # the queue stalls. Jobs only checkout + run, so no event-specific wiring is
  # needed here (unlike dco/identity, which read the PR base/head SHAs).
  merge_group:

# Least privilege: the workflow only reads the repo; it never mutates it.
permissions:
  contents: read

# One in-flight run per ref; a newer commit cancels the prior run so review
# feedback reflects the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each extension verify step on its own runner so the slow ones (tsc,
  # svelte-check) run concurrently instead of in series. Tasks map to the
  # package's scripts; `verify` locally is the same five in sequence.
  extension:
    name: extension (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, lint, check, "lint:styles", "test:run"]
    env:
      # Let corepack fetch the packageManager-pinned pnpm non-interactively.
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Activate the pnpm version pinned in the root package.json
      # `packageManager` field — do NOT pin pnpm anywhere else (drift guard).
      - run: corepack enable
      # Resolve the store path into a step output: actions/cache `path:` is a
      # static string, and the store only exists once corepack activates pnpm.
      - id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lunma/extension run ${{ matrix.task }}

  site:
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable
      - id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lunma/site verify

  # Aggregator: keeps `verify` as the one required status check while the work
  # runs in parallel above. `if: always()` so it reports even when a leg fails;
  # it then fails explicitly if any needed job did not succeed.
  verify:
    needs: [extension, site]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Gate on all extension + site checks
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}; then
            echo "::error::one or more extension/site checks did not pass"
            exit 1
          fi
          echo "extension + site checks passed"

  e2e:
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: corepack enable
      - id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lunma/extension exec playwright install --with-deps chromium
      # The e2e fixture loads the unpacked MV3 extension via --load-extension,
      # which Chromium permits only headed — so run under a virtual display.
      # `pnpm test:e2e` is `pnpm build && playwright test`; CI=true (set by
      # GitHub) makes the Playwright config apply its single retry.
      - run: xvfb-run -a pnpm test:e2e
