packages:
  - 'apps/*'
  - 'packages/*'
minimumReleaseAgeExclude:
  - '@sveltejs/kit@2.63.1'
# Security overrides for transitive (dev/build-time only) deps flagged by
# Dependabot — neither ships in the extension or static-site bundle.
overrides:
  # Stay on the same major: undici 8 drops the internal module path jsdom@29
  # requires; cookie kept in 0.x for @sveltejs/kit@2.65 compatibility.
  'undici@>=7.0.0 <7.28.0': '>=7.28.0 <8'
  'cookie@<0.7.0': '>=0.7.0 <1'
# Shared toolchain versions live here so the two apps' verify gates and compiler
# behaviour can never silently diverge. Both apps reference these via `catalog:`.
catalog:
  '@inlang/paraglide-js': ^2.22.0
  '@sveltejs/vite-plugin-svelte': ^7.2.0
  '@types/culori': ^4.0.1
  '@types/node': ^24
  culori: ^4.0.2
  jsdom: ^29.1.1
  svelte: ^5.56.5
  svelte-check: ^4.7.2
  typescript: ^6.0.3
  vite: ^8.1.4
  vitest: ^4.1.10
