packages:
  - 'apps/*'
  - 'packages/*'
minimumReleaseAgeExclude:
  - '@sveltejs/kit@2.63.1'
# Shared toolchain versions live here so the two apps' verify gates and compiler
# behaviour can never silently diverge. Both apps reference these via `catalog:`.
catalog:
  '@sveltejs/vite-plugin-svelte': ^7.1.2
  '@types/culori': ^4.0.1
  '@types/node': ^24
  culori: ^4.0.2
  jsdom: ^29.1.1
  svelte: ^5.56.3
  svelte-check: ^4.6.0
  typescript: ^6.0.3
  vite: ^8.0.16
  vitest: ^4.1.9
